<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal History — Delta Signal Engine</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="app-shell page-only" data-page="history">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">Δ</div>
      <div>
        <div class="brand-title">DELTA</div>
        <div class="brand-sub">SIGNAL ENGINE</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-nav="terminal" href="/"><span class="nav-icon">▦</span> Trading Terminal</a>
      <a class="nav-item" data-nav="signals" href="/signals"><span class="nav-icon">⚡</span> Signals</a>
      <a class="nav-item" data-nav="positions" href="/positions"><span class="nav-icon">◫</span> Positions</a>
      <a class="nav-item" data-nav="trades" href="/history/trades"><span class="nav-icon">⇄</span> Trades</a>
      <a class="nav-item" data-nav="history" href="/history"><span class="nav-icon">☰</span> History</a>
      <a class="nav-item" data-nav="performance" href="/performance"><span class="nav-icon">◔</span> Performance</a>
      <a class="nav-item" data-nav="settings" href="/settings"><span class="nav-icon">⚙</span> Settings</a>
    </nav>
    <div class="sidebar-status"><span class="dot ok"></span> All systems operational</div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div>
        <h1 class="page-title">Signal History</h1>
        <p class="page-sub">Approval workflow audit trail</p>
      </div>
    </header>

    <section class="page-toolbar">
      <label class="ctrl">
        <span>Filter</span>
        <select id="status-filter">
          <option value="">All</option>
          <option value="PENDING">Pending</option>
          <option value="APPROVED">Approved</option>
          <option value="REJECTED">Rejected</option>
        </select>
      </label>
      <button id="refresh-btn" type="button" class="btn-primary">Refresh</button>
    </section>

    <main class="page-content">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Symbol</th>
              <th>Signal TF</th>
              <th>Side</th>
              <th>Entry</th>
              <th>SL</th>
              <th>TP</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="history-body">
            <tr><td colspan="8" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/history.js"></script>
</body>
</html>
